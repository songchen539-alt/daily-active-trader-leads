name: Generate Active Lead Feed

on:
  schedule:
    - cron: "7 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Generate latest active feed
        run: node scripts/generate-active-feed.mjs
        env:
          X_BEARER_TOKEN: ${{ secrets.X_BEARER_TOKEN }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          APOLLO_API_KEY: ${{ secrets.APOLLO_API_KEY }}
          WIZA_API_KEY: ${{ secrets.WIZA_API_KEY }}
          LUSHA_API_KEY: ${{ secrets.LUSHA_API_KEY }}
          CONTACTOUT_API_KEY: ${{ secrets.CONTACTOUT_API_KEY }}

      - name: Commit feed data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/latest-active-feed.json data/latest-active-feed.csv data/client-opportunities.json data/client-opportunities.csv data/client-opportunities.html data/public-contact-prospects.json data/public-contact-prospects.csv data/contactable-prospects.json data/contactable-prospects.csv data/contactable-prospects.html data/social-community-entries.json data/social-community-entries.csv data/social-community-entries.html
          git diff --cached --quiet || git commit -m "Update active lead feed"
          git push
